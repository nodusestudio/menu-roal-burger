<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Limpiando...</title>
<style>body{background:#0f1116;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:16px}</style>
</head>
<body>
<p>⏳ Limpiando caché y Service Workers...</p>
<script>
async function clear() {
    if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
    }
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
    document.querySelector('p').textContent = '✅ Listo. Redirigiendo...';
    setTimeout(() => { window.location.href = '/admin.html'; }, 800);
}
clear();
</script>
</body>
</html>
